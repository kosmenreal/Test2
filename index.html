<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATR Dashboard</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
    }

    .pair {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .row {
      margin: 12px 0;
      font-size: 20px;
    }

    .value {
      color: #38bdf8;
      font-weight: bold;
    }

    .updated {
      margin-top: 15px;
      opacity: 0.7;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h1>BTC & SOL ATR Dashboard</h1>

<div class="grid">

  <div class="card">
    <div class="pair">BTCUSDT</div>

    <div class="row">
      1H ATR:
      <span class="value" id="btc1h">Loading...</span>
    </div>

    <div class="row">
      4H ATR:
      <span class="value" id="btc4h">Loading...</span>
    </div>

    <div class="updated" id="btcUpdated"></div>
  </div>

  <div class="card">
    <div class="pair">SOLUSDT</div>

    <div class="row">
      1H ATR:
      <span class="value" id="sol1h">Loading...</span>
    </div>

    <div class="row">
      4H ATR:
      <span class="value" id="sol4h">Loading...</span>
    </div>

    <div class="updated" id="solUpdated"></div>
  </div>

</div>

<script>

async function fetchCandles(symbol, interval) {

  const productMap = {
    BTCUSDT: "BTC-USD",
    SOLUSDT: "SOL-USD"
  };

  const granularityMap = {
    "1h": 3600,
    "4h": 14400
  };

  const product = productMap[symbol];
  const granularity = granularityMap[interval];

  const end = new Date();
  const start = new Date(end.getTime() - (100 * granularity * 1000));

  const url =
    `https://api.exchange.coinbase.com/products/${product}/candles` +
    `?granularity=${granularity}` +
    `&start=${start.toISOString()}` +
    `&end=${end.toISOString()}`;

  const response = await fetch(url);

  if (!response.ok) {
    throw new Error("API Error");
  }

  const data = await response.json();

  // Coinbase returns:
  // [time, low, high, open, close, volume]

  return data.reverse().map(candle => [
    candle[0],
    candle[3],
    candle[2],
    candle[1],
    candle[4],
    candle[5]
  ]);
}

function calculateATR(candles, period = 14) {

  let trs = [];

  for (let i = 1; i < candles.length; i++) {

    const high = parseFloat(candles[i][2]);
    const low = parseFloat(candles[i][3]);
    const prevClose = parseFloat(candles[i - 1][4]);

    const tr = Math.max(
      high - low,
      Math.abs(high - prevClose),
      Math.abs(low - prevClose)
    );

    trs.push(tr);
  }

  const lastTRs = trs.slice(-period);

  const atr =
    lastTRs.reduce((a,b) => a + b, 0) / period;

  return atr.toFixed(2);
}

async function updateATR(symbol, interval, elementId) {

  try {

    const candles = await fetchCandles(symbol, interval);

    const atr = calculateATR(candles);

    document.getElementById(elementId).innerText = atr;

  } catch (err) {

    console.error(err);

    document.getElementById(elementId).innerText = "Error";
  }
}

async function loadData() {

  await Promise.all([

    updateATR("BTCUSDT", "1h", "btc1h"),
    updateATR("BTCUSDT", "4h", "btc4h"),

    updateATR("SOLUSDT", "1h", "sol1h"),
    updateATR("SOLUSDT", "4h", "sol4h")

  ]);

  const time = new Date().toLocaleTimeString();

  document.getElementById("btcUpdated").innerText =
    "Updated: " + time;

  document.getElementById("solUpdated").innerText =
    "Updated: " + time;
}

loadData();

</script>

</body>
</html>
